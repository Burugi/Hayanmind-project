learning_rate:
  type: loguniform
  low: 1.0e-4
  high: 5.0e-3
embedding_dim:
  type: categorical
  choices: [16, 32, 64]
dcn_hidden_units:
  type: categorical
  choices:
    - [512, 256, 128]
    - [1024, 512, 256]
dcn_cross_layers:
  type: categorical
  choices: [2, 3, 4]
transformer_layers:
  type: categorical
  choices: [1, 2, 3]
num_heads:
  type: categorical
  choices: [1, 2, 4]
transformer_dropout:
  type: uniform
  low: 0.0
  high: 0.3
net_dropout:
  type: uniform
  low: 0.0
  high: 0.5
batch_size:
  type: categorical
  choices: [2048, 4096, 8192]
