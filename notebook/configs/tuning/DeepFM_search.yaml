learning_rate:
  type: loguniform
  low: 1.0e-4
  high: 5.0e-3
embedding_dim:
  type: categorical
  choices: [16, 32, 64]
hidden_units:
  type: categorical
  choices:
    - [256, 128]
    - [400, 400, 400]
    - [512, 256, 128]
net_dropout:
  type: uniform
  low: 0.0
  high: 0.5
batch_size:
  type: categorical
  choices: [2048, 4096, 8192]
