learning_rate:
  type: loguniform
  low: 1.0e-4
  high: 5.0e-3
embedding_dim:
  type: categorical
  choices: [16, 32, 64]
block_type:
  type: categorical
  choices: ["1B", "2B"]
block1_hidden_units:
  type: categorical
  choices:
    - [64, 64, 64]
    - [128, 128, 128]
    - [256, 256, 256]
block2_hidden_units:
  type: categorical
  choices:
    - [64, 64, 64]
    - [128, 128, 128]
    - [256, 256, 256]
use_feature_gating:
  type: categorical
  choices: [true, false]
block1_dropout:
  type: uniform
  low: 0.0
  high: 0.5
batch_size:
  type: categorical
  choices: [2048, 4096, 8192]
