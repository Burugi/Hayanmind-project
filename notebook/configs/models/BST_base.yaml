Base:
    num_workers: 3
    verbose: 1
    early_stop_patience: 2
    pickle_feature_encoder: True
    save_best_only: True
    eval_steps: null
    debug_mode: False
    group_id: null
    use_features: null
    feature_config: null
    # BST도 transformer로 시퀀스를 직접 처리하므로 DIN과 동일하게 raw [B, L, D]를 받아야 한다.
    # 시퀀스 피처의 기본 MaskedAveragePooling encoder를 null로 덮어쓴다.
    # 데이터셋을 바꾸면 해당 sequence 컬럼명으로 교체.
    feature_specs:
        - {name: item_history, feature_encoder: null}
        - {name: cate_history, feature_encoder: null}

BST:
    model: BST
    task: binary_classification
    loss: binary_crossentropy
    metrics: ['AUC', 'logloss']
    optimizer: adam
    learning_rate: 1.0e-3
    embedding_regularizer: 0
    net_regularizer: 0
    batch_size: 4096
    embedding_dim: 40
    dnn_hidden_units: [1024, 512, 256]
    dnn_activations: relu
    num_heads: 4
    stacked_transformer_layers: 1
    attention_dropout: 0
    net_dropout: 0
    layer_norm: True
    use_residual: True
    # AmazonElectronics의 (item_id, cate_id) + (item_history, cate_history) 조합을
    # tuple 그룹으로 묶어 하나의 transformer 블록에 태운다. 다른 데이터셋은 해당
    # 컬럼명으로 교체 (KuaiVideo: (item_id,) + (pos_items,) 등).
    bst_target_field:
        - !!python/tuple [item_id, cate_id]
    bst_sequence_field:
        - !!python/tuple [item_history, cate_history]
    seq_pooling_type: mean
    use_position_emb: True
    use_causal_mask: False
    batch_norm: False
    epochs: 20
    shuffle: True
    seed: 2026
    monitor: AUC
    monitor_mode: max
    gpu: 0

# ---------------------------------------------------------------------------
# Dataset-specific overrides (see DIN_base.yaml 주석 참조).
# ---------------------------------------------------------------------------

Base@TaobaoAd_x1:
    feature_specs:
        - {name: click_sequence, feature_encoder: null}
BST@TaobaoAd_x1:
    bst_target_field: adgroup_id
    bst_sequence_field: click_sequence

Base@KuaiVideo_x1:
    feature_specs:
        - {name: pos_items, feature_encoder: null}
BST@KuaiVideo_x1:
    bst_target_field: item_id
    bst_sequence_field: pos_items

Base@MicroVideo1.7M_x1:
    feature_specs:
        - {name: clicked_items, feature_encoder: null}
        - {name: clicked_categories, feature_encoder: null}
BST@MicroVideo1.7M_x1:
    bst_target_field:
        - !!python/tuple [item_id, cate_id]
    bst_sequence_field:
        - !!python/tuple [clicked_items, clicked_categories]
