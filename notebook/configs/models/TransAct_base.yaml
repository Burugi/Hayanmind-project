Base:
    num_workers: 3
    verbose: 1
    early_stop_patience: 2
    pickle_feature_encoder: True
    save_best_only: True
    eval_steps: null
    debug_mode: False
    group_id: null
    use_features: null
    feature_config: null
    # TransAct은 DCN + Transformer 조합으로 raw 시퀀스를 직접 처리.
    feature_specs:
        - {name: item_history, feature_encoder: null}
        - {name: cate_history, feature_encoder: null}

TransAct:
    model: TransAct
    task: binary_classification
    loss: binary_crossentropy
    metrics: ['AUC', 'logloss']
    optimizer: adam
    learning_rate: 1.0e-3
    embedding_regularizer: 0
    net_regularizer: 0
    batch_size: 4096
    embedding_dim: 40
    hidden_activations: relu
    dcn_cross_layers: 3
    dcn_hidden_units: [1024, 512, 256]
    mlp_hidden_units: []
    num_heads: 1
    transformer_layers: 1
    transformer_dropout: 0
    dim_feedforward: 512
    net_dropout: 0
    # (item_id, cate_id) / (item_history, cate_history) 그룹. 다른 데이터셋은 교체.
    target_item_field:
        - !!python/tuple [item_id, cate_id]
    sequence_item_field:
        - !!python/tuple [item_history, cate_history]
    first_k_cols: 1
    use_time_window_mask: False
    time_window_ms: 86400000
    concat_max_pool: True
    batch_norm: False
    epochs: 20
    shuffle: True
    seed: 2026
    monitor: AUC
    monitor_mode: max
    gpu: 0

# ---------------------------------------------------------------------------
# Dataset-specific overrides (see DIN_base.yaml 주석 참조).
# ---------------------------------------------------------------------------

Base@TaobaoAd_x1:
    feature_specs:
        - {name: click_sequence, feature_encoder: null}
TransAct@TaobaoAd_x1:
    target_item_field: adgroup_id
    sequence_item_field: click_sequence

Base@KuaiVideo_x1:
    feature_specs:
        - {name: pos_items, feature_encoder: null}
TransAct@KuaiVideo_x1:
    target_item_field: item_id
    sequence_item_field: pos_items

Base@MicroVideo1.7M_x1:
    feature_specs:
        - {name: clicked_items, feature_encoder: null}
        - {name: clicked_categories, feature_encoder: null}
TransAct@MicroVideo1.7M_x1:
    target_item_field:
        - !!python/tuple [item_id, cate_id]
    sequence_item_field:
        - !!python/tuple [clicked_items, clicked_categories]
