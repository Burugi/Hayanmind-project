Base:
    num_workers: 3
    verbose: 1
    early_stop_patience: 2
    pickle_feature_encoder: True
    save_best_only: True
    eval_steps: null
    debug_mode: False
    group_id: null
    use_features: null
    feature_specs: null
    feature_config: null

DeepFM:
    model: DeepFM
    task: binary_classification
    loss: binary_crossentropy
    metrics: ['AUC', 'logloss']
    optimizer: adam
    learning_rate: 1.0e-3
    embedding_regularizer: 0
    net_regularizer: 0
    batch_size: 4096
    embedding_dim: 40
    hidden_units: [400, 400, 400]
    hidden_activations: relu
    net_dropout: 0
    batch_norm: False
    epochs: 20
    shuffle: True
    seed: 2026
    monitor: AUC
    monitor_mode: max
    gpu: 0
