Base:
    model_root: './checkpoints/'
    num_workers: 3
    verbose: 1
    early_stop_patience: 2
    pickle_feature_encoder: True
    save_best_only: True
    eval_steps: null
    debug_mode: False
    group_id: null
    use_features: null
    feature_specs: null
    feature_config: null

JourneyMap_default:
    model: JourneyMap
    dataset_id: TBD
    loss: 'binary_crossentropy'
    metrics: ['logloss', 'AUC', 'PRAUC']
    task: binary_classification
    optimizer: adam
    learning_rate: 1.0e-3
    embedding_regularizer: 0
    net_regularizer: 0
    batch_size: 512
    embedding_dim: 32
    window_sizes: [3, 5, 7]
    num_prototypes: 64
    gru_hidden_size: 32
    gru_num_layers: 1
    temperature: 1.0
    net_dropout: 0
    epochs: 30
    shuffle: True
    seed: 42
    monitor: 'AUC'
    monitor_mode: 'max'
    accumulation_steps: 1
    save_prediction_details: True
